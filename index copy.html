<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genki Lesson 13 Vocab Flashcards</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    #cardPrompt {
      font-size: 3rem;
      margin: 30px 0 10px;
      font-weight: bold;
    }

    #mode {
      font-size: 1.2rem;
      color: #555;
      margin-top: 20px;
    }

    #hint {
      color: #777;
      margin-bottom: 15px;
    }

    input[type="text"] {
      font-size: 1.3rem;
      padding: 8px;
      width: 90%;
      max-width: 500px;
    }

    button {
      font-size: 1rem;
      padding: 8px 12px;
      margin-top: 10px;
    }

    #result {
      margin-top: 20px;
      font-size: 1.2rem;
      min-height: 40px;
    }

    #counter {
      margin-top: 10px;
      font-weight: bold;
    }

    .controls {
      margin-bottom: 15px;
    }

    label {
      margin-right: 12px;
      display: inline-block;
    }
  </style>
</head>

<body>
  <form id="myForm">
    <h1>Genki Lesson 13 Vocabulary</h1>

    <div class="controls">
      <strong>Categories:</strong><br>

      <input type="checkbox" id="nouns" checked>
      <label for="nouns">Nouns</label>

      <input type="checkbox" id="adjectives" checked>
      <label for="adjectives">Adjectives</label>

      <input type="checkbox" id="verbs" checked>
      <label for="verbs">Verbs</label>

      <input type="checkbox" id="expressions" checked>
      <label for="expressions">Expressions</label>

      <input type="checkbox" id="numbers" checked>
      <label for="numbers">Numbers</label>
    </div>

    <div class="controls">
      <strong>Direction:</strong><br>

      <input type="checkbox" id="jpToEn" checked>
      <label for="jpToEn">Japanese → English</label>

      <input type="checkbox" id="enToJp" checked>
      <label for="enToJp">English → Japanese</label>
    </div>

    <div class="controls">
      <input type="checkbox" id="showReading">
      <label for="showReading">Show reading hint on Japanese cards</label>
    </div>

    <div id="mode"></div>
    <div id="cardPrompt"></div>
    <div id="hint"></div>

    <input type="text" id="userInput" autocomplete="off" autofocus>
    <br>

    <button type="submit">Submit</button>
    <button type="button" id="showAnswerButton">Show Answer</button>

    <div id="result"></div>
    <div id="counter">Score: 0 / 0</div>
  </form>

  <script>
const vocab = [
  // Nouns

  },
  {

    category: "nouns"
  },
  {
    jp: "おじさん",

    en: ["uncle", "middle-aged man"],
    category: "nouns"
  },
  {
    jp: "おばさん",
    reading: "おばさん",
    en: ["aunt", "middle-aged woman"],
    category: "nouns"
  },
  {
    jp: "両親",
    reading: "りょうしん",
    en: ["parents"],
    category: "nouns"
  },
  {
    jp: "大家さん",
    reading: "おおやさん",
    en: ["landlord", "landlady"],
    category: "nouns"
  },
  {
    jp: "皆さん",
    reading: "みなさん",
    en: ["everyone", "all of you"],
    category: "nouns"
  },
  {
    jp: "チョコレート",
    reading: "チョコレート",
    en: ["chocolate"],
    category: "nouns"
  },
  {
    jp: "みかん",
    reading: "みかん",
    en: ["mandarin orange", "orange"],
    category: "nouns"
  },
  {
    jp: "トレーナー",
    reading: "トレーナー",
    en: ["sweatshirt"],
    category: "nouns"
  },
  {
    jp: "シャツ",
    reading: "シャツ",
    en: ["shirt"],
    category: "nouns"
  },
  {
    jp: "ネクタイ",
    reading: "ネクタイ",
    en: ["necktie", "tie"],
    category: "nouns"
  },
  {
    jp: "マフラー",
    reading: "マフラー",
    en: ["winter scarf", "scarf"],
    category: "nouns"
  },
  {
    jp: "指輪",
    reading: "ゆびわ",
    en: ["ring"],
    category: "nouns"
  },
  {
    jp: "鉛筆",
    reading: "えんぴつ",
    en: ["pencil"],
    category: "nouns"
  },
  {
    jp: "ぬいぐるみ",
    reading: "ぬいぐるみ",
    en: ["stuffed animal", "teddy bear", "plush toy"],
    category: "nouns"
  },
  {
    jp: "漫画",
    reading: "まんが",
    en: ["comic book", "manga"],
    category: "nouns"
  },
  {
    jp: "化粧品",
    reading: "けしょうひん",
    en: ["cosmetics", "makeup"],
    category: "nouns"
  },
  {
    jp: "ラジオ",
    reading: "ラジオ",
    en: ["radio"],
    category: "nouns"
  },
  {
    jp: "お皿",
    reading: "おさら",
    en: ["plate", "dish"],
    category: "nouns"
  },
  {
    jp: "お返し",
    reading: "おかえし",
    en: ["return gift", "return", "token of gratitude"],
    category: "nouns"
  },
  {
    jp: "履歴書",
    reading: "りれきしょ",
    en: ["resume", "résumé", "CV"],
    category: "nouns"
  },
  {
    jp: "クリスマス",
    reading: "クリスマス",
    en: ["Christmas"],
    category: "nouns"
  },
  {
    jp: "バレンタインデー",
    reading: "バレンタインデー",
    en: ["Valentine's Day", "Valentines Day"],
    category: "nouns"
  },
  {
    jp: "ホワイトデー",
    reading: "ホワイトデー",
    en: ["White Day"],
    category: "nouns"
  },

  // Adjectives
  {
    jp: "欲しい",
    reading: "ほしい",
    en: ["to want", "want", "wanted"],
    category: "adjectives"
  },
  {
    jp: "おしゃれな",
    reading: "おしゃれな",
    jpAnswers: ["おしゃれな", "おしゃれ"],
    en: ["fashionable", "stylish"],
    category: "adjectives"
  },
  {
    jp: "けちな",
    reading: "けちな",
    jpAnswers: ["けちな", "けち"],
    en: ["stingy", "cheap"],
    category: "adjectives"
  },

  // Verbs
  {
    jp: "送る",
    reading: "おくる",
    en: ["to send", "send"],
    category: "verbs"
  },
  {
    jp: "似合う",
    reading: "にあう",
    en: ["to look good on", "look good on", "to suit", "suit"],
    category: "verbs"
  },
  {
    jp: "あきらめる",
    reading: "あきらめる",
    en: ["to give up", "give up"],
    category: "verbs"
  },
  {

    reading: "あげる",
    en: ["to give", "give", "to give to others"],
    category: "verbs"
  },
  {
    jp: "くれる",
    reading: "くれる",
    en: ["to give me", "give me", "to give us", "give us"],
    category: "verbs"
  },
  {
    jp: "できる",
    reading: "できる",
    en: ["to come into existence", "come into existence", "to be made", "be made", "can do"],
    category: "verbs"
  },
  {
    jp: "相談する",
    reading: "そうだんする",
    en: ["to consult", "consult", "to ask for advice", "ask for advice"],
    category: "verbs"
  },
  {
    jp: "注意する",
    reading: "ちゅういする",
    en: ["to give warning", "give warning", "to warn", "warn", "to watch out", "watch out"],
    category: "verbs"
  },
  {
    jp: "プロポーズする",
    reading: "プロポーズする",
    en: ["to propose marriage", "propose marriage", "to propose", "propose"],
    category: "verbs"
  },

  // Adverbs and expressions
  {
    jp: "～くん",
    reading: "～くん",
    en: ["Mr.", "Ms.", "casual suffix"],
    category: "expressions"
  },
  {
    jp: "～たち",
    reading: "～たち",
    en: ["plural suffix", "makes a noun plural"],
    category: "expressions"
  },
  {
    jp: "私たち",
    reading: "わたしたち",
    en: ["we", "us"],
    category: "expressions"
  },
  {
    jp: "こんな",
    reading: "こんな",
    en: ["like this", "this kind of"],
    category: "expressions"
  },
  {
    jp: "急に",
    reading: "きゅうに",
    en: ["suddenly"],
    category: "expressions"
  },
  {
    jp: "ちょうど",
    reading: "ちょうど",
    en: ["exactly", "just"],
    category: "expressions"
  },
  {
    jp: "よく",
    reading: "よく",
    en: ["well", "often"],
    category: "expressions"
  },
  {
    jp: "さあ",
    reading: "さあ",
    en: ["I am not sure", "I don't know"],
    category: "expressions"
  },
  {
    jp: "どうしたらいい",
    reading: "どうしたらいい",
    en: ["what should one do", "what should I do", "what should we do"],
    category: "expressions"
  },

  // Counters
  {
    jp: "～個",
    reading: "～こ",
    en: ["counter for small items", "generic counter for smaller items"],
    category: "numbers"
  },
  {
    jp: "～冊",
    reading: "～さつ",
    en: ["counter for bound volumes", "counter for books"],
    category: "numbers"
  },
  {
    jp: "～台",
    reading: "～だい",
    en: ["counter for equipment", "counter for machines", "counter for vehicles"],
    category: "numbers"
  },
  {
    jp: "～匹",
    reading: "～ひき",
    en: ["counter for small animals", "counter for smaller animals"],
    category: "numbers"
  },
  {
    jp: "～本",
    reading: "～ほん",
    en: ["counter for long objects", "counter for cylindrical objects"],
    category: "numbers"
  }
];

    let currentCard = null;
    let currentDirection = null;
    let correctCounter = 0;
    let totalCounter = 0;

    function normalizeEnglish(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/[.,!?;:()]/g, "")
        .replace(/[’']/g, "")
        .replace(/\.\.\./g, "")
        .replace(/\s+/g, " ")
        .replace(/^to be /, "")
        .replace(/^to /, "");
    }

    function normalizeJapanese(text) {
      return text
        .trim()
        .replace(/\s+/g, "")
        .replace(/[～~]/g, "");
    }

    function getCheckedCategories() {
      const categories = [];

      if (document.getElementById("nouns").checked) {
        categories.push("nouns");
      }

      if (document.getElementById("adjectives").checked) {
        categories.push("adjectives");
      }

      if (document.getElementById("verbs").checked) {
        categories.push("verbs");
      }

      if (document.getElementById("expressions").checked) {
        categories.push("expressions");
      }

      if (document.getElementById("numbers").checked) {
        categories.push("numbers");
      }

      return categories;
    }

    function getCheckedDirections() {
      const directions = [];

      if (document.getElementById("jpToEn").checked) {
        directions.push("jp-en");
      }

      if (document.getElementById("enToJp").checked) {
        directions.push("en-jp");
      }

      return directions;
    }

    function getRandomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function displayNewCard() {
      const selectedCategories = getCheckedCategories();
      const selectedDirections = getCheckedDirections();

      const resultElement = document.getElementById("result");
      const modeElement = document.getElementById("mode");
      const cardPromptElement = document.getElementById("cardPrompt");
      const hintElement = document.getElementById("hint");

      if (selectedCategories.length === 0) {
        cardPromptElement.textContent = "Select at least one category.";
        modeElement.textContent = "";
        hintElement.textContent = "";
        currentCard = null;
        return;
      }

      if (selectedDirections.length === 0) {
        cardPromptElement.textContent = "Select at least one direction.";
        modeElement.textContent = "";
        hintElement.textContent = "";
        currentCard = null;
        return;
      }

      const selectedVocab = vocab.filter(card =>
        selectedCategories.includes(card.category)
      );

      currentCard = getRandomItem(selectedVocab);
      currentDirection = getRandomItem(selectedDirections);

      resultElement.textContent = "";

      if (currentDirection === "jp-en") {
        modeElement.textContent = "Japanese → English";
        cardPromptElement.textContent = currentCard.jp;

        if (document.getElementById("showReading").checked) {
          hintElement.textContent = "Reading: " + currentCard.reading;
        } else {
          hintElement.textContent = "Type the English meaning.";
        }
      } else {
        modeElement.textContent = "English → Japanese";
        cardPromptElement.textContent = currentCard.en[0];
        hintElement.textContent = "Type the Japanese word. Kanji or kana reading is accepted.";
      }

      document.getElementById("userInput").focus();
    }

    function checkAnswer(userInput) {
      if (!currentCard) {
        return false;
      }

      if (currentDirection === "jp-en") {
        const normalizedInput = normalizeEnglish(userInput);

        return currentCard.en.some(answer =>
          normalizeEnglish(answer) === normalizedInput
        );
      }

      if (currentDirection === "en-jp") {
        const normalizedInput = normalizeJapanese(userInput);

        const acceptedJapaneseAnswers = [
          currentCard.jp,
          currentCard.reading,
          ...(currentCard.jpAnswers || [])
        ];

        return acceptedJapaneseAnswers.some(answer =>
          normalizeJapanese(answer) === normalizedInput
        );
      }

      return false;
    }

    function getCorrectAnswerText() {
      if (!currentCard) {
        return "";
      }

      if (currentDirection === "jp-en") {
        return `${currentCard.en[0]} — ${currentCard.jp}（${currentCard.reading}）`;
      }

      return `${currentCard.jp}（${currentCard.reading}） — ${currentCard.en[0]}`;
    }

    document.getElementById("myForm").addEventListener("submit", function(event) {
      event.preventDefault();

      const userInput = document.getElementById("userInput").value.trim();
      const resultElement = document.getElementById("result");
      const counterElement = document.getElementById("counter");

      if (!currentCard || userInput === "") {
        return;
      }

      totalCounter++;

      if (checkAnswer(userInput)) {
        correctCounter++;
        resultElement.textContent = "Correct!";
        resultElement.style.color = "green";
      } else {
        resultElement.textContent = "Incorrect. Correct answer: " + getCorrectAnswerText();
        resultElement.style.color = "red";
      }

      counterElement.textContent = `Score: ${correctCounter} / ${totalCounter}`;

      document.getElementById("userInput").value = "";

      setTimeout(displayNewCard, 700);
    });

    document.getElementById("showAnswerButton").addEventListener("click", function() {
      const resultElement = document.getElementById("result");

      resultElement.textContent = "Answer: " + getCorrectAnswerText();
      resultElement.style.color = "blue";
      document.getElementById("userInput").focus();
    });

    const allCheckboxes = document.querySelectorAll("input[type='checkbox']");

    allCheckboxes.forEach(checkbox => {
      checkbox.addEventListener("change", displayNewCard);
    });

    displayNewCard();
  </script>
</body>
</html>
