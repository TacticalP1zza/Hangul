function normalizeEnglish(text) {
  return text
    .toLowerCase()
    .trim()
    .replace(/[.,!?;:()]/g, "")
    .replace(/[’']/g, "")
    .replace(/\.\.\./g, "")
    .replace(/\s+/g, " ")
    .replace(/^to be /, "")
    .replace(/^to /, "");
}

function normalizeJapanese(text) {
  return text
    .trim()
    .replace(/\s+/g, "")
    .replace(/[～~]/g, "")
    .replace(/[。、「」『』]/g, "");
}

}

    testTypes.push("writing");
  }

  if (document.getElementById("sentenceTest").checked) {
    testTypes.push("sentence");
  }

  if (document.getElementById("meaningTest").checked) {
    testTypes.push("meaning");
  }

  return testTypes;
}

function getRandomItem(array) {
  return array[Math.floor(Math.random() * array.length)];
}

function formatSentence(sentence) {
  return sentence.replace(/【(.+?)】/g, '<span class="target">$1</span>');
}

function buildQuestionPool() {
  const selectedPages = getSelectedPages();
  const selectedKinds = getSelectedKinds();
  const selectedTestTypes = getSelectedTestTypes();

  const filteredCards = cards.filter(card =>
    selectedPages.includes(card.page) &&
    selectedKinds.includes(card.kind)
  );

  const questionPool = [];

  selectedTestTypes.forEach(testType => {
    filteredCards.forEach(card => {
      if (testType === "sentence" && !card.sentence) {
        return;
      }

      questionPool.push({
        type: testType,
        card: card
      });
    });
  });

  return questionPool;
}

function displayNewCard() {
  const resultElement = document.getElementById("result");
  const modeElement = document.getElementById("mode");
  const cardPromptElement = document.getElementById("cardPrompt");
  const hintElement = document.getElementById("hint");

  const questionPool = buildQuestionPool();

  if (questionPool.length === 0) {
    currentQuestion = null;
    modeElement.textContent = "";
    cardPromptElement.textContent = "Select at least one test style, content type, and page.";
    hintElement.textContent = "";
    resultElement.textContent = "";
    return;
  }

  currentQuestion = getRandomItem(questionPool);
  const card = currentQuestion.card;

  resultElement.textContent = "";
  cardPromptElement.innerHTML = "";

  if (currentQuestion.type === "reading") {
    modeElement.textContent = "漢字の読み方：Kanji → hiragana";
    cardPromptElement.textContent = card.jp;
    hintElement.textContent = "Type the hiragana reading.";
  }

  if (currentQuestion.type === "writing") {
    modeElement.textContent = "漢字を書く：Hiragana → kanji";
    cardPromptElement.textContent = card.readings.join(" / ");
    hintElement.textContent = "Type the kanji. Include okurigana if needed, for example 悪い or 着く.";
  }

  if (currentQuestion.type === "sentence") {
    modeElement.textContent = "文の中で漢字を書く：Sentence kanji writing";
    cardPromptElement.innerHTML = formatSentence(card.sentence);
    hintElement.textContent = "Type only the kanji for the underlined hiragana.";
  }

  if (currentQuestion.type === "meaning") {
    modeElement.textContent = "意味：Japanese → English";
    cardPromptElement.textContent = card.jp;
    hintElement.textContent = "Type the English meaning.";
  }

  document.getElementById("userInput").focus();
}

function checkAnswer(userInput) {
  if (!currentQuestion) {
    return false;
  }

  const card = currentQuestion.card;

  if (currentQuestion.type === "reading") {
    const normalizedInput = normalizeJapanese(userInput);

    return card.readings.some(reading =>
      normalizeJapanese(reading) === normalizedInput
    );
  }

  if (currentQuestion.type === "writing" || currentQuestion.type === "sentence") {
    const normalizedInput = normalizeJapanese(userInput);

    const acceptedJapaneseAnswers = [
      card.jp,
      ...(card.jpAnswers || [])
    ];

    return acceptedJapaneseAnswers.some(answer =>
      normalizeJapanese(answer) === normalizedInput
    );
  }

  if (currentQuestion.type === "meaning") {
    const normalizedInput = normalizeEnglish(userInput);

    return card.en.some(answer =>
      normalizeEnglish(answer) === normalizedInput
    );
  }

  return false;
}

function getCorrectAnswerText() {
  if (!currentQuestion) {
    return "";
  }

  const card = currentQuestion.card;

  if (currentQuestion.type === "reading") {
    return `${card.jp} → ${card.readings.join(" / ")}`;
  }

  if (currentQuestion.type === "writing" || currentQuestion.type === "sentence") {
    return `${card.readings.join(" / ")} → ${card.jp}`;
  }

  if (currentQuestion.type === "meaning") {
    return `${card.jp}（${card.readings.join(" / ")}） → ${card.en[0]}`;
  }

  return "";
}

document.getElementById("myForm").addEventListener("submit", function(event) {
  event.preventDefault();

  const userInput = document.getElementById("userInput").value.trim();
  const resultElement = document.getElementById("result");
  const counterElement = document.getElementById("counter");

  if (!currentQuestion || userInput === "") {
    return;
  }

  totalCounter++;

  if (checkAnswer(userInput)) {
    correctCounter++;
    resultElement.textContent = "Correct!";
    resultElement.style.color = "green";
  } else {
    resultElement.textContent = "Incorrect. Correct answer: " + getCorrectAnswerText();
    resultElement.style.color = "red";
  }

  counterElement.textContent = `Score: ${correctCounter} / ${totalCounter}`;

  document.getElementById("userInput").value = "";

  setTimeout(displayNewCard, 900);
});

document.getElementById("showAnswerButton").addEventListener("click", function() {
  const resultElement = document.getElementById("result");

  resultElement.textContent = "Answer: " + getCorrectAnswerText();
  resultElement.style.color = "blue";
  document.getElementById("userInput").focus();
});

const allCheckboxes = document.querySelectorAll("input[type='checkbox']");

allCheckboxes.forEach(checkbox => {
  checkbox.addEventListener("change", displayNewCard);
});

displayNewCard();
  </script>
</body>
